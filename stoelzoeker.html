<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Jeroen & Élaine – Jouw Plaats</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --cream:#faf7f2;--warm:#f5f0e8;--sand:#e8ddd0;
  --rose:#a07060;--rose-dark:#7a4a3a;--rose-light:#c49080;
  --brown:#4a3828;--brown-mid:#6a5040;--brown-light:#8a7060;
  --border:#d8cdc0;--gold:#c8a878;
}
html,body{background:var(--cream);color:var(--brown);font-family:'Libre Baskerville',Georgia,serif;}
body{padding:40px 28px 60px;max-width:480px;margin:0 auto;}

.title{
  font-family:'Cormorant Garamond',Georgia,serif;
  font-size:44px;font-weight:300;font-style:italic;
  text-align:center;color:var(--brown);
  line-height:1.2;margin-bottom:6px;
}
.title span{font-style:normal;font-weight:400;}
.subtitle{
  text-align:center;font-size:17px;font-style:italic;
  color:var(--brown-light);margin-bottom:6px;
}
.ornament{
  display:block;width:60px;height:1px;
  background:var(--gold);margin:0 auto 28px;
}

.search-label{
  display:block;font-size:14px;letter-spacing:2px;
  text-transform:uppercase;color:var(--brown-light);
  text-align:center;margin-bottom:10px;
}
.search-box{position:relative;margin-bottom:4px;}
.search-box input{
  width:100%;padding:15px 44px 15px 18px;
  font-size:20px;font-family:'Libre Baskerville',Georgia,serif;
  color:var(--brown);background:white;
  border:1px solid var(--border);border-radius:2px;
  outline:none;-webkit-appearance:none;
  transition:border-color 0.2s;
}
.search-box input:focus{border-color:var(--rose);}
.search-box input::placeholder{color:#c8c0b4;font-style:italic;}
.search-clear{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;
  font-size:20px;color:var(--brown-light);
  display:none;padding:4px;line-height:1;
}

.suggestions{
  background:white;border:1px solid var(--border);border-top:none;
  max-height:200px;overflow-y:auto;display:none;
}
.suggestion-item{
  padding:16px 20px;font-size:18px;cursor:pointer;
  border-bottom:1px solid #f0ebe3;
  font-family:'Libre Baskerville',Georgia,serif;
}
.suggestion-item:last-child{border-bottom:none;}
.suggestion-item:active{background:var(--warm);}
.suggestion-item em{font-style:normal;color:var(--rose);font-weight:700;}

.divider{
  display:none;align-items:center;gap:12px;
  margin:28px 0;
}
.divider-line{flex:1;height:1px;background:var(--border);}
.divider-ornament{color:var(--gold);font-size:14px;}

.result{display:none;}
.result-card{
  background:white;border:1px solid var(--border);
  border-radius:2px;padding:36px 28px;text-align:center;
  border-top:3px solid var(--rose-light);
}
.result-firstname{
  font-family:'Cormorant Garamond',Georgia,serif;
  font-size:72px;color:var(--brown);line-height:1.1;
}
.result-lastname{
  font-family:'Cormorant Garamond',Georgia,serif;
  font-size:32px;font-weight:800;color:var(--brown-mid);
  line-height:1.2;margin-bottom:20px;
}
.result-label{font-size:13px;letter-spacing:3px;text-transform:uppercase;color:var(--rose);margin-bottom:10px;}
.result-table{
  font-family:'Cormorant Garamond',Georgia,serif;
  font-size:72px;font-weight:300;color:var(--brown);line-height:1;margin-bottom:16px;
}
.result-seat{font-size:26px;color:var(--brown-light);font-style:italic;margin-bottom:30px;}
.result-sep{width:40px;height:1px;background:var(--gold);margin:0 auto 18px;}
.result-mid-sep{width:40px;height:1px;background:var(--border);margin:12px auto 16px;}
.result-diet{
  background:var(--warm);border:1px solid var(--border);
  border-radius:2px;padding:10px 14px;
  font-size:16px;color:var(--brown-mid);margin-bottom:14px;display:none;
}
.result-diet strong{display:block;font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--rose);margin-bottom:4px;}
.result-note{font-size:12px;color:var(--brown-light);font-style:italic;display:none;}
.result-makan{font-size:13px;color:var(--border);font-style:italic;margin-top:20px;letter-spacing:1px;}

.not-found{display:none;text-align:center;padding:24px 0;}
.not-found p{font-size:17px;color:var(--brown-light);font-style:italic;line-height:1.6;}

.no-data{display:none;text-align:center;padding:32px 0;}
.no-data p{font-size:17px;color:var(--brown-light);font-style:italic;line-height:1.7;}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.fadein{animation:fadeUp 0.3s ease;}
</style>
</head>
<body>

<div class="title"><span>Jeroen</span> &amp; <span>Élaine</span></div>
<div class="subtitle">Vind jouw plaats aan tafel</div>
<span class="ornament"></span>

<label class="search-label" for="name-input">Jouw naam</label>
<div class="search-box">
  <input type="text" id="name-input" placeholder="Typ je naam…"
    autocomplete="off" autocorrect="off" spellcheck="false" inputmode="text"/>
  <button class="search-clear" id="clear-btn" onclick="clearSearch()" aria-label="Wissen">×</button>
</div>
<div class="suggestions" id="suggestions"></div>

<div class="no-data" id="no-data">
  <p>De zitplaatsen zijn nog niet ingevuld.<br>Kom later terug!</p>
</div>

<div class="divider" id="divider">
  <div class="divider-line"></div>
  <div class="divider-ornament">✦</div>
  <div class="divider-line"></div>
</div>

<div class="result" id="result">
  <div class="result-card">
    <div class="result-firstname" id="res-firstname"></div>
    <div class="result-lastname" id="res-lastname"></div>
    <div class="result-mid-sep"></div>
    <div class="result-label">Jouw tafel</div>
    <div class="result-table" id="res-table"></div>
    <div class="result-seat" id="res-seat"></div>
    <div class="result-sep"></div>
    <div class="result-diet" id="res-diet">
      <strong>Dieetwens</strong>
      <span id="res-diet-text"></span>
    </div>
    <div class="result-note" id="res-note"></div>
    <div class="result-makan">Selamat makan</div>
  </div>
</div>

<div class="not-found" id="not-found">
  <p>We konden <strong id="nf-name"></strong> niet vinden.<br>Controleer de spelling of vraag het bruidspaar.</p>
</div>

<script>
var STORAGE_KEY='jeroen_elaine_seating_v1';
var seatData={}, allNames=[];

function parseSeats(data){
  allNames=[];
  Object.keys(data).forEach(function(sid){
    var d=data[sid];
    if(d&&d.naam&&d.naam.trim()){
      var parts=sid.split('.');
      allNames.push({naam:d.naam.trim(),seat:sid,table:parts[0],dieet:d.dieet||'',opmerking:d.opmerking||''});
    }
  });
  if(!allNames.length) document.getElementById('no-data').style.display='block';
}

function loadData(){
  fetch('https://raw.githubusercontent.com/jedekocom/seatingapp/main/stoelindeling.json?_='+Date.now())
    .then(function(r){if(!r.ok)throw new Error();return r.json();})
    .then(function(data){seatData=data;parseSeats(data);})
    .catch(function(){
      try{
        var raw=localStorage.getItem(STORAGE_KEY);
        if(!raw){document.getElementById('no-data').style.display='block';return;}
        seatData=JSON.parse(raw);parseSeats(seatData);
      }catch(e){document.getElementById('no-data').style.display='block';}
    });
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function highlight(str,q){
  if(!q)return esc(str);
  var i=str.toLowerCase().indexOf(q.toLowerCase());
  if(i<0)return esc(str);
  return esc(str.substring(0,i))+'<em>'+esc(str.substring(i,i+q.length))+'</em>'+esc(str.substring(i+q.length));
}

function showResult(m){
  var delen=m.naam.split(' ');
  var voornaam=delen[0];
  var achternaam=delen.slice(1).join(' ');
  document.getElementById('res-firstname').textContent=voornaam;
  var lastnameEl=document.getElementById('res-lastname');
  lastnameEl.textContent=achternaam;
  lastnameEl.style.display=achternaam?'block':'none';
  document.getElementById('res-table').textContent=m.table;
  document.getElementById('res-seat').textContent='Stoel '+m.seat;
  var diet=document.getElementById('res-diet');
  var note=document.getElementById('res-note');
  if(m.dieet&&m.dieet.trim()){document.getElementById('res-diet-text').textContent=m.dieet;diet.style.display='block';}
  else{diet.style.display='none';}
  if(m.opmerking&&m.opmerking.trim()){note.textContent=m.opmerking;note.style.display='block';}
  else{note.style.display='none';}
  var r=document.getElementById('result');
  r.style.display='block';r.className='result fadein';
  document.getElementById('not-found').style.display='none';
  document.getElementById('divider').style.display='flex';
}

function search(q){
  var sug=document.getElementById('suggestions');
  var clearBtn=document.getElementById('clear-btn');
  clearBtn.style.display=q?'block':'none';
  if(!q){
    sug.style.display='none';
    document.getElementById('result').style.display='none';
    document.getElementById('not-found').style.display='none';
    document.getElementById('divider').style.display='none';
    return;
  }
  var matches=allNames.filter(function(n){return n.naam.toLowerCase().includes(q.toLowerCase());});
  var exact=allNames.find(function(n){return n.naam.toLowerCase()===q.toLowerCase();});
  if(exact){sug.style.display='none';showResult(exact);}
  else if(matches.length===1){sug.style.display='none';showResult(matches[0]);}
  else if(matches.length>1){
    sug.innerHTML=matches.slice(0,8).map(function(m){
      return '<div class="suggestion-item" onclick="pick(\''+esc(m.naam)+'\')">'+highlight(m.naam,q)+'</div>';
    }).join('');
    sug.style.display='block';
    document.getElementById('result').style.display='none';
    document.getElementById('not-found').style.display='none';
    document.getElementById('divider').style.display='none';
  } else {
    sug.style.display='none';
    document.getElementById('result').style.display='none';
    document.getElementById('nf-name').textContent='"'+q+'"';
    var nf=document.getElementById('not-found');
    nf.style.display='block';nf.className='not-found fadein';
    document.getElementById('divider').style.display='flex';
  }
}

function pick(naam){
  document.getElementById('name-input').value=naam;
  document.getElementById('suggestions').style.display='none';
  var m=allNames.find(function(n){return n.naam===naam;});
  if(m)showResult(m);
}

function clearSearch(){
  document.getElementById('name-input').value='';
  document.getElementById('name-input').focus();
  search('');
}

document.getElementById('name-input').addEventListener('input',function(){search(this.value.trim());});
document.getElementById('name-input').addEventListener('keydown',function(e){
  if(e.key==='Enter'){var f=document.getElementById('suggestions').querySelector('.suggestion-item');if(f)f.click();}
});
document.addEventListener('click',function(e){
  if(!e.target.closest('.search-box')&&!e.target.closest('.suggestions'))
    document.getElementById('suggestions').style.display='none';
});

loadData();
</script>
</body>
</html>
